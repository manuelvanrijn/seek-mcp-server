name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install seek CLI
        run: go install github.com/dualeai/seek/cmd/seek@latest

      - name: Verify seek
        run: seek -version

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
