name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24, latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install seek CLI
        run: go install github.com/dualeai/seek/cmd/seek@latest

      - name: Verify seek indexes the repo
        run: seek 'SERVER_NAME'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
